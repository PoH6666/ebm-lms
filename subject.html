<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBM LMS — Subjects</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/dashboard.css">
    <style>
        /* ── Page header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 14px;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-header p {
            font-size: 0.83rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 9px 14px;
        }
        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.85rem;
            width: 200px;
        }

        /* ── Filter tabs ── */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font);
            transition: all 0.2s;
        }
        .filter-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .filter-tab:hover:not(.active) {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Subject grid ── */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
        }

        /* ── Subject card ── */
        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .subject-card:hover {
            transform: translateY(-3px);
            border-color: rgba(91,127,255,0.4);
        }
        .subject-card-banner {
            height: 7px;
        }
        .subject-card-body {
            padding: 20px;
        }
        .subject-card-code {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .subject-card-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .subject-card-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .subject-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .subject-card-teacher {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .subject-card-status {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .status-active {
            background: rgba(91,255,154,0.1);
            color: #5bff9a;
        }
        .status-inactive {
            background: rgba(255,91,91,0.1);
            color: #ff7d7d;
        }

        /* ── Progress (student view) ── */
        .subject-progress {
            margin-bottom: 14px;
        }
        .subject-progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .subject-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width 0.8s ease;
        }
        .subject-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        /* ── Empty state ── */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 14px;
        }
        .empty-state h3 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .empty-state p { font-size: 0.85rem; }
        .empty-state a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Banner colors */
        .banner-0 { background: linear-gradient(90deg,#5b7fff,#7c5bff); }
        .banner-1 { background: linear-gradient(90deg,#5bf0ff,#5b7fff); }
        .banner-2 { background: linear-gradient(90deg,#ffc55b,#ff8c5b); }
        .banner-3 { background: linear-gradient(90deg,#7c5bff,#ff5bb8); }
        .banner-4 { background: linear-gradient(90deg,#5bff9a,#5bf0ff); }
        .banner-5 { background: linear-gradient(90deg,#ff5bb8,#ffc55b); }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">EB</div>
            <div class="brand-text">EBM <span class="brand-lms">LMS</span></div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">Main</div>
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span> Dashboard
            </a>
            <a href="subject.html" class="nav-item active">
                <span class="nav-icon">📚</span> Subjects
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📝</span> Assignments
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📊</span> Grades
            </a>

            <div id="teacherNavSection" style="display:none;">
                <div class="nav-section">Teacher</div>
                <a href="teacher.html" class="nav-item">
                    <span class="nav-icon">🧑‍🏫</span> Teacher Panel
                </a>
            </div>

            <div class="nav-section">School</div>
            <a href="#" class="nav-item">
                <span class="nav-icon">✅</span> Attendance
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🔔</span> Announcements
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📅</span> Schedule
            </a>

            <div class="nav-section">Account</div>
            <a href="#" class="nav-item">
                <span class="nav-icon">👤</span> Profile
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">⚙️</span> Settings
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-avatar" id="sidebarAvatar">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarName">Loading...</div>
                <div class="user-role" id="sidebarRole">—</div>
            </div>
            <button class="logout-btn" id="logoutBtn" title="Logout">⏻</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 id="pageTitle">My Subjects 📚</h1>
                <p id="pageSubtitle">All your enrolled subjects and learning materials</p>
            </div>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search subjects...">
            </div>
        </div>

        <!-- Filter tabs (student only) -->
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="all">All Subjects</button>
            <button class="filter-tab" data-filter="ongoing">Ongoing</button>
            <button class="filter-tab" data-filter="completed">Completed</button>
            <button class="filter-tab" data-filter="not_started">Not Started</button>
        </div>

        <div class="subjects-grid" id="subjectsGrid">
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <h3>Loading subjects...</h3>
            </div>
        </div>
    </main>

    <script>
        const TEACH_API = '/api/teacher.php';
        const AUTH_API  = '/auth/auth.php';

        // ── Auth ────────────────────────────────────────
        const user = JSON.parse(localStorage.getItem('ebm_user') || 'null');
        if (!user || !user.id) { window.location.href = 'login.html'; }

        const firstName = user.first_name || (user.name || '').split(' ')[0] || 'User';
        const lastName  = user.last_name  || (user.name || '').split(' ').slice(1).join(' ') || '';
        const fullName  = (firstName + ' ' + lastName).trim();
        const role      = user.role || 'student';

        // Sidebar
        document.getElementById('sidebarName').textContent   = fullName;
        document.getElementById('sidebarRole').textContent   = role.charAt(0).toUpperCase() + role.slice(1);
        document.getElementById('sidebarAvatar').textContent = ((firstName[0]||'') + (lastName[0]||'')).toUpperCase() || '?';

        if (role === 'teacher' || role === 'admin') {
            document.getElementById('teacherNavSection').style.display = 'block';
            // Update page labels for teacher
            document.getElementById('pageTitle').textContent    = 'My Subjects 🧑‍🏫';
            document.getElementById('pageSubtitle').textContent = 'Subjects you created and manage';
            document.getElementById('filterTabs').style.display = 'none';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('ebm_user');
            window.location.href = 'login.html';
        });

        // ── Helpers ─────────────────────────────────────
        function esc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        async function postAPI(url, body) {
            const fd = new FormData();
            Object.entries(body).forEach(([k,v]) => fd.append(k, v));
            const res = await fetch(url, { method: 'POST', body: fd });
            return res.json();
        }

        // ── Render subjects ──────────────────────────────
        let allSubjects = [];

        function renderSubjects(subjects) {
            const grid = document.getElementById('subjectsGrid');
            if (!subjects || !subjects.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <h3>${role === 'teacher' ? 'No subjects yet.' : 'No subjects enrolled yet.'}</h3>
                        <p>${role === 'teacher'
                            ? '<a href="teacher.html">Create your first subject →</a>'
                            : 'Your teacher will enroll you in subjects.'}</p>
                    </div>`;
                return;
            }

            grid.innerHTML = subjects.map((s, i) => `
                <div class="subject-card" onclick="${role === 'teacher' ? "window.location.href='teacher.html'" : "window.location.href='module.html'"}">
                    <div class="subject-card-banner banner-${i % 6}"></div>
                    <div class="subject-card-body">
                        <div class="subject-card-code">${esc(s.subject_code || 'N/A')}</div>
                        <div class="subject-card-name">${esc(s.subject_name)}</div>
                        <div class="subject-card-desc">${esc(s.description || 'No description provided.')}</div>
                        ${role !== 'teacher' ? `
                        <div class="subject-progress">
                            <div class="subject-progress-label">
                                <span>Progress</span>
                                <span>${s.progress || 0}%</span>
                            </div>
                            <div class="subject-progress-bar">
                                <div class="subject-progress-fill" style="width:${s.progress || 0}%"></div>
                            </div>
                        </div>` : ''}
                        <div class="subject-card-footer">
                            <span class="subject-card-teacher">
                                ${role === 'teacher' ? '🧑‍🏫 You' : '👤 ' + esc(s.teacher_name || '—')}
                            </span>
                            <span class="subject-card-status ${s.status === 'active' ? 'status-active' : 'status-inactive'}">
                                ${s.status || 'active'}
                            </span>
                        </div>
                    </div>
                </div>`).join('');
        }

        // ── Load subjects by role ────────────────────────
        async function loadSubjects() {
            try {
                let subjects = [];

                if (role === 'teacher' || role === 'admin') {
                    const data = await postAPI(TEACH_API, {
                        action: 'get_my_subjects',
                        teacher_id: user.id
                    });
                    subjects = data.status === 'success' ? (data.subjects || []) : [];
                } else {
                    // Student — get enrolled subjects
                    const data = await postAPI(AUTH_API, {
                        action: 'get_enrolled_modules',
                        user_id: user.id
                    });
                    subjects = data.status === 'success' ? (data.data || data.modules || data.subjects || []) : [];
                }

                allSubjects = subjects;
                renderSubjects(subjects);
            } catch(e) {
                document.getElementById('subjectsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <h3>Could not load subjects</h3>
                        <p>${e.message}</p>
                    </div>`;
            }
        }

        // ── Filter tabs (student only) ───────────────────
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const f = btn.dataset.filter;
                if (f === 'all') {
                    renderSubjects(allSubjects);
                } else if (f === 'ongoing') {
                    renderSubjects(allSubjects.filter(s => (s.progress || 0) > 0 && (s.progress || 0) < 100));
                } else if (f === 'completed') {
                    renderSubjects(allSubjects.filter(s => (s.progress || 0) >= 100));
                } else {
                    renderSubjects(allSubjects.filter(s => !s.progress || s.progress == 0));
                }
            });
        });

        // ── Search ───────────────────────────────────────
        document.getElementById('searchInput').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderSubjects(allSubjects.filter(s =>
                (s.subject_name || '').toLowerCase().includes(q) ||
                (s.subject_code || '').toLowerCase().includes(q) ||
                (s.description || '').toLowerCase().includes(q)
            ));
        });

        loadSubjects();
    </script>
</body>
</html>
